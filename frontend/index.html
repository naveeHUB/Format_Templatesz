<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Excel Transformation Engine</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>🔄 Universal Excel Transformation Engine</h1>
            <button id="theme-toggle" class="theme-toggle">🌙 Dark Mode</button>
        </header>
        
        <main class="main-content">
            <!-- Step 1: Upload Template -->
            <section class="step-section" id="step-template">
                <h2>📁 Step 1: Upload Excel Template</h2>
                <div id="template-drop-zone" class="drop-zone">
                    <p>Drag & drop template Excel file (.xlsx, .xls)</p>
                    <p>or</p>
                    <button id="template-upload-btn" class="upload-btn">Select Template</button>
                    <input type="file" id="template-file-input" accept=".xlsx,.xls" style="display: none;">
                </div>
                <div id="template-status" class="status"></div>
                <div id="template-structure" style="display: none; margin-top: 20px;">
                    <h3>📊 Template Structure</h3>
                    <div id="structure-display"></div>
                </div>
            </section>
            
            <!-- Step 2: Upload Source File -->
            <section class="step-section" id="step-source" style="display: none;">
                <h2>📂 Step 2: Upload Source Excel File</h2>
                <div id="source-drop-zone" class="drop-zone">
                    <p>Drag & drop source Excel file (.xlsx, .xls)</p>
                    <p>or</p>
                    <button id="source-upload-btn" class="upload-btn">Select Source File</button>
                    <input type="file" id="source-file-input" accept=".xlsx,.xls" style="display: none;">
                </div>
                <div id="source-status" class="status"></div>
            </section>
            
            <!-- Step 3: Mapping Interface -->
            <section class="step-section" id="step-mapping" style="display: none;">
                <h2>🔗 Step 3: Column Mapping</h2>
                <div id="match-score" class="match-score"></div>
                <div id="mapping-table-container"></div>
                <div class="action-buttons">
                    <button id="save-mappings" class="primary-btn">💾 Save Mappings</button>
                    <button id="continue-generation" class="success-btn">🚀 Generate Output</button>
                </div>
            </section>
            
            <!-- Step 4: Generation Results -->
            <section class="step-section" id="step-results" style="display: none;">
                <h2>✅ Step 4: Generation Complete</h2>
                <div id="generation-status" class="success-message"></div>
                <button id="download-output" class="primary-btn">📥 Download Generated Excel</button>
                <button id="new-transformation" class="secondary-btn">🔄 Start New Transformation</button>
            </section>
        </main>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
